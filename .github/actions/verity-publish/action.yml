name: Verity publish
description: Publish artifacts with Verity keyless signing and provenance
inputs:
  path:
    description: Directory or file to publish
    required: true
  namespace:
    description: Verity namespace (e.g. gh/owner/repo)
    required: true
  artifact:
    description: Artifact name within the namespace
    required: true
  tag:
    description: Optional semver tag
    required: false
    default: ""
  sbom:
    description: Optional SBOM file path (SPDX or CycloneDX)
    required: false
    default: ""
  skip-sign:
    description: Skip Sigstore signing (local dev only)
    required: false
    default: "false"
  skip-provenance:
    description: Skip provenance attestation
    required: false
    default: "false"
  verity-api-url:
    description: Verity API URL (defaults to VERITY_API_URL)
    required: false
    default: ""
  verity-registry-url:
    description: OCI registry URL (defaults to VERITY_REGISTRY_URL)
    required: false
    default: ""
  verity-token:
    description: API bearer token (defaults to VERITY_TOKEN)
    required: false
    default: ""
runs:
  using: composite
  steps:
    - name: Build verity CLI
      shell: bash
      run: go build -o "${{ runner.temp }}/verity" ./cmd/verity

    - name: Publish
      shell: bash
      env:
        VERITY_API_URL: ${{ inputs.verity-api-url != '' && inputs.verity-api-url || env.VERITY_API_URL }}
        VERITY_REGISTRY_URL: ${{ inputs.verity-registry-url != '' && inputs.verity-registry-url || env.VERITY_REGISTRY_URL }}
        VERITY_TOKEN: ${{ inputs.verity-token != '' && inputs.verity-token || env.VERITY_TOKEN }}
      run: |
        set -euo pipefail
        args=(
          "${{ runner.temp }}/verity" publish "${{ inputs.path }}"
          --namespace "${{ inputs.namespace }}"
          --artifact "${{ inputs.artifact }}"
        )
        if [ -n "${{ inputs.tag }}" ]; then
          args+=(--tag "${{ inputs.tag }}")
        fi
        if [ -n "${{ inputs.sbom }}" ]; then
          args+=(--sbom "${{ inputs.sbom }}")
        fi
        if [ "${{ inputs.skip-sign }}" = "true" ]; then
          args+=(--skip-sign)
        fi
        if [ "${{ inputs.skip-provenance }}" = "true" ]; then
          args+=(--skip-provenance)
        fi
        "${args[@]}"
