name: Lineagis verify
description: Verify artifact trust for a pinned digest (local Sigstore + API policy)
inputs:
  digest:
    description: sha256 digest to verify (required)
    required: true
  namespace:
    description: Lineagis namespace (e.g. gh/owner/repo)
    required: true
  artifact:
    description: Artifact name within the namespace
    required: true
  local-verify:
    description: Run local cosign verify (default true)
    required: false
    default: "true"
  lineagis-api-url:
    description: Lineagis API URL (defaults to LINEAGIS_API_URL)
    required: false
    default: ""
  lineagis-registry-url:
    description: OCI registry URL (defaults to LINEAGIS_REGISTRY_URL)
    required: false
    default: ""
  lineagis-token:
    description: API bearer token (defaults to LINEAGIS_TOKEN)
    required: false
    default: ""
outputs:
  digest:
    description: Verified digest
    value: ${{ steps.verify.outputs.digest }}
  passed:
    description: "true when verification passed"
    value: ${{ steps.verify.outputs.passed }}
runs:
  using: composite
  steps:
    - name: Build lineagis CLI
      shell: bash
      run: go build -o "${{ runner.temp }}/lineagis" ./cmd/lineagis

    - name: Verify trust
      id: verify
      shell: bash
      env:
        LINEAGIS_API_URL: ${{ inputs.lineagis-api-url != '' && inputs.lineagis-api-url || env.LINEAGIS_API_URL }}
        LINEAGIS_REGISTRY_URL: ${{ inputs.lineagis-registry-url != '' && inputs.lineagis-registry-url || env.LINEAGIS_REGISTRY_URL }}
        LINEAGIS_TOKEN: ${{ inputs.lineagis-token != '' && inputs.lineagis-token || env.LINEAGIS_TOKEN }}
      run: |
        set -euo pipefail
        args=(
          "${{ runner.temp }}/lineagis" verify "${{ inputs.digest }}"
          --namespace "${{ inputs.namespace }}"
          --artifact "${{ inputs.artifact }}"
          --output json
        )
        if [ "${{ inputs.local-verify }}" != "true" ]; then
          args+=(--trust-api)
        fi
        if ! out="$("${args[@]}")"; then
          echo "passed=false" >> "$GITHUB_OUTPUT"
          echo "$out"
          exit 1
        fi
        echo "digest=${{ inputs.digest }}" >> "$GITHUB_OUTPUT"
        echo "passed=true" >> "$GITHUB_OUTPUT"
        echo "$out"
