name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    name: release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Build Linux binary
        run: make build VERSION=${{ github.ref_name }}

      - name: Build Windows binary
        run: |
          GOOS=windows GOARCH=amd64 go build -ldflags "-X github.com/BrendenWalker/lineagis/internal/version.Version=${{ github.ref_name }}" -o bin/lineagis.exe ./cmd/lineagis

      - name: Package artifacts
        run: |
          mkdir -p dist
          tar -czf dist/lineagis-linux-amd64.tar.gz -C bin lineagis
          zip -j dist/lineagis-windows-amd64.zip bin/lineagis.exe

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            dist/lineagis-linux-amd64.tar.gz
            dist/lineagis-windows-amd64.zip
