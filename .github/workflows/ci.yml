name: CI

on:
  pull_request:
  push:
    branches:
      - main
  merge_group:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Lint
        uses: golangci/golangci-lint-action@v7
        with:
          version: v2.12

  test:
    name: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Test
        run: make test-lineage TEST_FLAGS=-race

      - name: Upload coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: coverage.out
          if-no-files-found: ignore

  build:
    name: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Build Linux binary
        run: make build

      - name: Build Windows binary
        run: |
          GOOS=windows GOARCH=amd64 go build -ldflags "-X github.com/BrendenWalker/lineagis/internal/version.Version=dev" -o bin/lineagis.exe ./cmd/lineagis

      - name: Upload Linux binary
        uses: actions/upload-artifact@v4
        with:
          name: lineagis-binaries-linux-amd64
          path: bin/lineagis
          if-no-files-found: error

      - name: Upload Windows binary
        uses: actions/upload-artifact@v4
        with:
          name: lineagis-binaries-windows-amd64
          path: bin/lineagis.exe
          if-no-files-found: error

  smoke-lineage:
    name: smoke-lineage
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Download Linux binary
        uses: actions/download-artifact@v4
        with:
          name: lineagis-binaries-linux-amd64
          path: bin

      - name: Lineage smoke
        run: |
          chmod +x bin/lineagis
          bash scripts/smoke-lineage.sh
