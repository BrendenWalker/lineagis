name: publish-keyless-smoke

on:
  workflow_dispatch:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

permissions:
  contents: read
  id-token: write

jobs:
  keyless-publish:
    name: keyless-publish
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: verity
          POSTGRES_PASSWORD: verity
          POSTGRES_DB: verity
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U verity -d verity"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5
      registry:
        image: ghcr.io/project-zot/zot:v2.1.11
        ports:
          - 5000:5000

    env:
      VERITY_DATABASE_URL: postgres://verity:verity@localhost:5432/verity?sslmode=disable
      VERITY_REGISTRY_URL: http://localhost:5000
      VERITY_DEV_TOKEN: dev-local-token
      VERITY_API_URL: http://localhost:8080
      VERITY_TOKEN: dev-local-token

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Wait for registry
        run: |
          for i in $(seq 1 30); do
            curl -sf http://localhost:5000/v2/ >/dev/null && exit 0
            sleep 2
          done
          exit 1

      - name: Build CLI and API
        run: |
          go build -o bin/verity ./cmd/verity
          go build -o bin/verity-api ./cmd/verity-api

      - name: Start Verity API
        env:
          VERITY_API_ADDR: :8080
          VERITY_MIGRATE_ON_STARTUP: "true"
        run: |
          ./bin/verity-api &
          for i in $(seq 1 60); do
            curl -sf http://localhost:8080/readyz | grep -qx ok && exit 0
            sleep 2
          done
          echo "API not ready" >&2
          exit 1

      - name: Prepare publish payload
        run: |
          mkdir -p dist
          echo "gha keyless smoke $(date -u +%Y-%m-%dT%H:%M:%SZ)" > dist/release.txt

      - name: Keyless publish (no --skip-sign)
        run: |
          OWNER_LC="$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')"
          NS="gh/${OWNER_LC}/verity-smoke"
          echo "namespace=${NS}" >> "$GITHUB_ENV"
          OUTPUT="$(./bin/verity publish dist/ \
            --namespace "${NS}" \
            --artifact smoke \
            --tag "0.0.0+gha.${{ github.run_id }}" 2>&1)" || {
            echo "$OUTPUT"
            exit 1
          }
          echo "$OUTPUT"
          DIGEST="$(echo "$OUTPUT" | grep -E '^sha256:[a-f0-9]{64}$' | tail -1)"
          test -n "$DIGEST"
          echo "digest=${DIGEST}" >> "$GITHUB_ENV"
          echo "Published ${DIGEST}"

      - name: Verify signature attached
        run: |
          curl -sf -H "Authorization: Bearer ${VERITY_TOKEN}" \
            "${VERITY_API_URL}/v1/namespaces/${namespace}/artifacts/smoke/signatures?digest=${digest}" \
            | tee signatures.json
          test "$(jq '.signatures | length' signatures.json)" -gt 0

      - name: Verify trust status
        run: |
          curl -sf -H "Authorization: Bearer ${VERITY_TOKEN}" \
            "${VERITY_API_URL}/v1/namespaces/${namespace}/artifacts/smoke/trust?digest=${digest}" \
            | tee trust.json
          jq -e '.signatures.status == "valid"' trust.json
          jq -e '.attestations.provenance == true' trust.json
          jq -e '.overall == "pass"' trust.json

      - name: Verify with verity verify action
        uses: ./.github/actions/verity-verify
        with:
          digest: ${{ env.digest }}
          namespace: ${{ env.namespace }}
          artifact: smoke

      - name: Inspect signed artifact (JSON, AC-DX-005)
        run: |
          ./bin/verity inspect dist/ \
            --namespace "${namespace}" \
            --artifact smoke \
            --output json > inspect-dist.json
          jq -e '.version == 1 and .overall == "pass"' inspect-dist.json
          jq -e '.checks[0].status == "pass"' inspect-dist.json
          jq -e '.checks[0].requirement_id == "FR-SIGN-005"' inspect-dist.json
          HUMAN="$(./bin/verity inspect dist/ --namespace "${namespace}" --artifact smoke)"
          echo "${HUMAN}" | grep -F 'Signature verified locally'
          jq -e '[.checks[].message] | any(contains("workflow"))' inspect-dist.json

      - name: Inspect signed artifact by digest (exit 0, AC-DX-003)
        run: |
          ./bin/verity verify "${digest}" \
            --namespace "${namespace}" \
            --artifact smoke \
            --output json > inspect-digest.json
          jq -e --arg digest "${digest}" \
            '.version == 1 and .overall == "pass" and .digest == $digest' inspect-digest.json

      - name: Publish unsigned artifact before policy (--skip-sign)
        run: |
          mkdir -p dist-unsigned
          echo "unsigned smoke $(date -u +%Y-%m-%dT%H:%M:%SZ)" > dist-unsigned/release.txt
          OUTPUT="$(./bin/verity publish dist-unsigned/ \
            --namespace "${namespace}" \
            --artifact smoke-unsigned \
            --skip-sign 2>&1)" || {
            echo "$OUTPUT"
            exit 1
          }
          echo "$OUTPUT"
          UNSIGNED_DIGEST="$(echo "$OUTPUT" | grep -E '^sha256:[a-f0-9]{64}$' | tail -1)"
          test -n "$UNSIGNED_DIGEST"
          echo "unsigned_digest=${UNSIGNED_DIGEST}" >> "$GITHUB_ENV"

      - name: Apply strict-release policy (wrong workflow, AC-POL-002b)
        run: |
          POLICY="$(jq --arg repo "${{ github.repository }}" \
            '.document.rules[1].config.publishers[0].repository = $repo' \
            docs/examples/policies/strict-release.json)"
          curl -sf -X PUT \
            -H "Authorization: Bearer ${VERITY_TOKEN}" \
            -H "Content-Type: application/json" \
            -d "$POLICY" \
            "${VERITY_API_URL}/v1/namespaces/${namespace}/policy"
          curl -sf -H "Authorization: Bearer ${VERITY_TOKEN}" \
            "${VERITY_API_URL}/v1/namespaces/${namespace}/policy" \
            | jq -e '.document.rules | map(.type // .id) | index("trusted-publishers") != null'

      - name: Push-time block for wrong workflow (strict-release)
        run: |
          set +e
          OUTPUT="$(./bin/verity publish dist/ \
            --namespace "${namespace}" \
            --artifact smoke \
            --tag "0.0.0+wrong-workflow.${{ github.run_id }}" 2>&1)"
          RC=$?
          set -e
          echo "$OUTPUT"
          test "${RC}" -ne 0
          echo "${OUTPUT}" | grep -Fi 'trusted-publishers'

      - name: Verify fails under strict-release wrong workflow (AC-OV-005)
        run: |
          set +e
          ./bin/verity verify "${digest}" \
            --namespace "${namespace}" \
            --artifact smoke \
            --output json > verify-strict-fail.json
          RC=$?
          set -e
          test "${RC}" -eq 1
          jq -e '.overall == "fail"' verify-strict-fail.json
          jq -e '[.checks[]] | any(.rule_id == "trusted-publishers")' verify-strict-fail.json

      - name: Enable require-signatures policy
        run: |
          curl -sf -X PUT \
            -H "Authorization: Bearer ${VERITY_TOKEN}" \
            -H "Content-Type: application/json" \
            -d '{"document":{"rules":[{"id":"require-signatures"}]}}' \
            "${VERITY_API_URL}/v1/namespaces/${namespace}/policy"
          curl -sf -H "Authorization: Bearer ${VERITY_TOKEN}" \
            "${VERITY_API_URL}/v1/namespaces/${namespace}/policy" \
            | jq -e '.document.rules[0].id == "require-signatures"'

      - name: Unsigned RegisterDigest fails after policy (FR-SIGN-007)
        run: |
          set +e
          OUTPUT="$(./bin/verity publish dist-unsigned/ \
            --namespace "${namespace}" \
            --artifact smoke-unsigned-new \
            --skip-sign 2>&1)"
          RC=$?
          set -e
          echo "$OUTPUT"
          test "${RC}" -ne 0
          echo "${OUTPUT}" | grep -F 'require-signatures'

      - name: Unsigned publish with tag fails (FR-SIGN-007)
        run: |
          set +e
          OUTPUT="$(./bin/verity publish dist-unsigned/ \
            --namespace "${namespace}" \
            --artifact smoke-unsigned \
            --skip-sign \
            --tag "0.0.0+unsigned.${{ github.run_id }}" 2>&1)"
          RC=$?
          set -e
          echo "$OUTPUT"
          test "${RC}" -ne 0
          echo "${OUTPUT}" | grep -F 'require-signatures'

      - name: Verify trust reports policy failure with reasons
        run: |
          curl -sf -H "Authorization: Bearer ${VERITY_TOKEN}" \
            "${VERITY_API_URL}/v1/namespaces/${namespace}/artifacts/smoke-unsigned/trust?digest=${unsigned_digest}" \
            | tee trust-unsigned.json
          jq -e '.signatures.status == "missing"' trust-unsigned.json
          jq -e '.policy.status == "fail"' trust-unsigned.json
          jq -e '.policy.reasons[0].rule == "require-signatures"' trust-unsigned.json

      - name: Inspect unsigned artifact fails with rule ids (AC-DX-003, FR-DX-007)
        run: |
          set +e
          INSPECT_OUT="$(./bin/verity inspect dist-unsigned/ \
            --namespace "${namespace}" \
            --artifact smoke-unsigned 2>&1)"
          INSPECT_RC=$?
          set -e
          echo "$INSPECT_OUT"
          test "${INSPECT_RC}" -eq 1
          echo "${INSPECT_OUT}" | grep -F 'FR-SIGN-005'
          echo "${INSPECT_OUT}" | grep -F 'rule require-signatures'

          set +e
          ./bin/verity inspect dist-unsigned/ \
            --namespace "${namespace}" \
            --artifact smoke-unsigned \
            --output json > inspect-unsigned.json
          JSON_RC=$?
          set -e
          test "${JSON_RC}" -eq 1
          jq -e '.version == 1 and .overall == "fail"' inspect-unsigned.json
          jq -e '.checks[0].requirement_id == "FR-SIGN-005"' inspect-unsigned.json
          jq -e '.checks[0].rule_id == "require-signatures"' inspect-unsigned.json
          jq -e '.checks[0].message | contains("rule require-signatures")' inspect-unsigned.json

      - name: Signed artifact still passes inspect after policy enabled
        run: |
          ./bin/verity inspect dist/ \
            --namespace "${namespace}" \
            --artifact smoke \
            --output json > inspect-signed-after-policy.json
          jq -e '.overall == "pass"' inspect-signed-after-policy.json
