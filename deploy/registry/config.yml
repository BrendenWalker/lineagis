version: 0.1
log:
  level: info
storage:
  s3:
    region: us-east-1
    bucket: registry
    regionendpoint: http://minio:9000
    secure: false
    v4auth: true
    forcepathstyle: true
    rootdirectory: /registry
http:
  addr: :5000
  headers:
    X-Content-Type-Options: [nosniff]
health:
  storagedriver:
    enabled: true
    interval: 10s
    threshold: 3
