services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-verity}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-verity}
      POSTGRES_DB: ${POSTGRES_DB:-verity}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-verity} -d ${POSTGRES_DB:-verity}"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 10s

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 10s

  minio-init:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
      MINIO_REGISTRY_BUCKET: ${MINIO_REGISTRY_BUCKET:-registry}
    entrypoint: /bin/sh
    command: /init.sh
    volumes:
      - ./deploy/minio/init.sh:/init.sh:ro
    restart: "no"

  registry:
    image: registry:2
    depends_on:
      minio-init:
        condition: service_completed_successfully
    environment:
      REGISTRY_STORAGE_S3_ACCESSKEY: ${MINIO_ROOT_USER:-minioadmin}
      REGISTRY_STORAGE_S3_SECRETKEY: ${MINIO_ROOT_PASSWORD:-minioadmin}
      REGISTRY_STORAGE_S3_BUCKET: ${MINIO_REGISTRY_BUCKET:-registry}
      REGISTRY_STORAGE_S3_REGION: us-east-1
      REGISTRY_STORAGE_S3_REGIONENDPOINT: http://minio:9000
      REGISTRY_STORAGE_S3_SECURE: "false"
      REGISTRY_STORAGE_S3_V4AUTH: "true"
      REGISTRY_STORAGE_S3_FORCEPATHSTYLE: "true"
      REGISTRY_STORAGE_S3_ROOTDIRECTORY: /registry
    ports:
      - "5000:5000"
    volumes:
      - ./deploy/registry/config.yml:/etc/docker/registry/config.yml:ro
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:5000/v2/ | grep -q '{}'"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 10s

  api:
    build:
      context: .
      dockerfile: Dockerfile
    depends_on:
      postgres:
        condition: service_healthy
      registry:
        condition: service_healthy
    environment:
      VERITY_API_ADDR: ${VERITY_API_ADDR:-:8080}
      VERITY_DATABASE_URL: postgres://${POSTGRES_USER:-verity}:${POSTGRES_PASSWORD:-verity}@postgres:5432/${POSTGRES_DB:-verity}?sslmode=disable
      VERITY_REGISTRY_URL: http://registry:5000
      VERITY_LOG_LEVEL: ${VERITY_LOG_LEVEL:-info}
      VERITY_LOG_FORMAT: ${VERITY_LOG_FORMAT:-json}
      VERITY_MIGRATE_ON_STARTUP: ${VERITY_MIGRATE_ON_STARTUP:-true}
    ports:
      - "${VERITY_API_PORT:-8080}:8080"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:8080/readyz | grep -qx ok"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 15s

volumes:
  postgres_data:
  minio_data:
