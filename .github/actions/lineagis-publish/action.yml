name: Lineagis publish
description: Publish artifacts with Lineagis keyless signing and provenance
inputs:
  path:
    description: Directory or file to publish
    required: true
  namespace:
    description: Lineagis namespace (e.g. gh/owner/repo)
    required: true
  artifact:
    description: Artifact name within the namespace
    required: true
  tag:
    description: Optional semver tag
    required: false
    default: ""
  sbom:
    description: Optional SBOM file path (SPDX or CycloneDX)
    required: false
    default: ""
  skip-sign:
    description: Skip Sigstore signing (local dev only)
    required: false
    default: "false"
  skip-provenance:
    description: Skip provenance attestation
    required: false
    default: "false"
  lineagis-api-url:
    description: Lineagis API URL (defaults to LINEAGIS_API_URL)
    required: false
    default: ""
  lineagis-registry-url:
    description: OCI registry URL (defaults to LINEAGIS_REGISTRY_URL)
    required: false
    default: ""
  lineagis-token:
    description: API bearer token (defaults to LINEAGIS_TOKEN)
    required: false
    default: ""
runs:
  using: composite
  steps:
    - name: Build lineagis CLI
      shell: bash
      run: go build -o "${{ runner.temp }}/lineagis" ./cmd/lineagis

    - name: Publish
      shell: bash
      env:
        LINEAGIS_API_URL: ${{ inputs.lineagis-api-url != '' && inputs.lineagis-api-url || env.LINEAGIS_API_URL }}
        LINEAGIS_REGISTRY_URL: ${{ inputs.lineagis-registry-url != '' && inputs.lineagis-registry-url || env.LINEAGIS_REGISTRY_URL }}
        LINEAGIS_TOKEN: ${{ inputs.lineagis-token != '' && inputs.lineagis-token || env.LINEAGIS_TOKEN }}
      run: |
        set -euo pipefail
        args=(
          "${{ runner.temp }}/lineagis" publish "${{ inputs.path }}"
          --namespace "${{ inputs.namespace }}"
          --artifact "${{ inputs.artifact }}"
        )
        if [ -n "${{ inputs.tag }}" ]; then
          args+=(--tag "${{ inputs.tag }}")
        fi
        if [ -n "${{ inputs.sbom }}" ]; then
          args+=(--sbom "${{ inputs.sbom }}")
        fi
        if [ "${{ inputs.skip-sign }}" = "true" ]; then
          args+=(--skip-sign)
        fi
        if [ "${{ inputs.skip-provenance }}" = "true" ]; then
          args+=(--skip-provenance)
        fi
        "${args[@]}"
