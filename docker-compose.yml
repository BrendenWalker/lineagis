services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-lineagis}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-lineagis}
      POSTGRES_DB: ${POSTGRES_DB:-lineagis}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-lineagis} -d ${POSTGRES_DB:-lineagis}"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 10s

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 10s

  minio-init:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
      MINIO_REGISTRY_BUCKET: ${MINIO_REGISTRY_BUCKET:-registry}
    entrypoint: /bin/sh
    command: /init.sh
    volumes:
      - ./deploy/minio/init.sh:/init.sh:ro
    restart: "no"

  registry:
    image: ghcr.io/project-zot/zot:v2.1.11
    depends_on:
      minio-init:
        condition: service_completed_successfully
    command: ["serve", "/etc/zot/config.json"]
    ports:
      - "5000:5000"
    volumes:
      - ./deploy/registry/config.json:/etc/zot/config.json:ro
    # Zot image is distroless (no shell/wget); API probes /livez at runtime.

  api:
    build:
      context: .
      dockerfile: Dockerfile
    depends_on:
      postgres:
        condition: service_healthy
      registry:
        condition: service_started
    environment:
      LINEAGIS_API_ADDR: ${LINEAGIS_API_ADDR:-:8080}
      LINEAGIS_DATABASE_URL: postgres://${POSTGRES_USER:-lineagis}:${POSTGRES_PASSWORD:-lineagis}@postgres:5432/${POSTGRES_DB:-lineagis}?sslmode=disable
      LINEAGIS_REGISTRY_URL: http://registry:5000
      LINEAGIS_LOG_LEVEL: ${LINEAGIS_LOG_LEVEL:-info}
      LINEAGIS_LOG_FORMAT: ${LINEAGIS_LOG_FORMAT:-json}
      LINEAGIS_MIGRATE_ON_STARTUP: ${LINEAGIS_MIGRATE_ON_STARTUP:-true}
      LINEAGIS_DEV_TOKEN: ${LINEAGIS_DEV_TOKEN:-dev-local-token}
    ports:
      - "${LINEAGIS_API_PORT:-8080}:8080"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:8080/readyz | grep -qx ok"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 15s

volumes:
  postgres_data:
  minio_data:
