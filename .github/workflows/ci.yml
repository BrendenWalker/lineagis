name: CI

on:
  pull_request:
  push:
    branches:
      - main
  merge_group:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Lint
        uses: golangci/golangci-lint-action@v7
        with:
          version: v2.12

  test:
    name: test
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: verity
          POSTGRES_PASSWORD: verity
          POSTGRES_DB: verity
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U verity -d verity"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5
      registry:
        image: ghcr.io/project-zot/zot:v2.1.11
        ports:
          - 5000:5000
    env:
      VERITY_TEST_DATABASE_URL: postgres://verity:verity@localhost:5432/verity?sslmode=disable
      VERITY_TEST_REGISTRY_URL: http://localhost:5000
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Test
        run: make test TEST_FLAGS=-race

      - name: Wait for registry
        run: |
          for i in $(seq 1 30); do
            if curl -sf http://localhost:5000/v2/ >/dev/null; then
              exit 0
            fi
            sleep 2
          done
          echo "registry not ready" >&2
          exit 1

      - name: Integration test
        run: make test-integration TEST_FLAGS=-race

      - name: Upload coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: coverage.out
          if-no-files-found: ignore

  build:
    name: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Build
        run: make build
